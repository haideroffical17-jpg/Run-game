<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VYROVA — AI Video Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0b0d13;--bg2:#111420;--bg3:#161a27;--bg4:#1c2133;--border:#252b3d;--border2:#2e3650;--purple:#7c3aed;--purple2:#9d5cf6;--blue:#3b82f6;--teal:#0d9488;--pink:#ec4899;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
h1,h2,h3{font-family:'Syne',sans-serif;}
#home-page{display:flex;height:100vh;}
#editor-page{display:none;height:100vh;flex-direction:column;}
.sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.logo{padding:18px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#fff;}
.logo-text{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#fff;letter-spacing:1px;}
.logo-sub{font-size:10px;color:var(--text3);}
.nav{padding:10px 8px;flex:1;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;margin-bottom:2px;transition:all 0.2s;color:var(--text2);font-size:13px;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(79,70,229,0.2));color:#fff;border:1px solid rgba(124,58,237,0.4);}
.nav-item svg{width:16px;height:16px;flex-shrink:0;}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border);}
.user-card{display:flex;align-items:center;gap:9px;padding:9px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;}
.user-av{width:34px;height:34px;background:linear-gradient(135deg,#7c3aed,#ec4899);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0;}
.main{flex:1;overflow-y:auto;background:var(--bg);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);}
.content{padding:22px 24px;}
.create-card{background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(59,130,246,0.06));border:1px dashed rgba(124,58,237,0.4);border-radius:14px;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:22px;}
.new-proj-btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;}
.new-proj-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,58,237,0.4);}
.upload-zone{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;}
.upload-zone:hover{border-color:var(--purple);}
.section-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#fff;margin-bottom:14px;}
.ai-tools{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.ai-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.2s;position:relative;}
.ai-card:hover{transform:translateY(-2px);border-color:var(--purple);}
.ai-badge{position:absolute;top:10px;right:10px;background:rgba(124,58,237,0.3);border:1px solid rgba(124,58,237,0.5);border-radius:5px;padding:1px 7px;font-size:9px;font-weight:700;color:var(--purple2);}
.ai-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.ai-card h3{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;margin-bottom:4px;}
.ai-card p{font-size:11px;color:var(--text2);line-height:1.5;}
.projects-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.project-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all 0.2s;}
.project-card:hover{transform:translateY(-2px);}
.project-thumb{position:relative;aspect-ratio:16/9;}
.play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;background:rgba(0,0,0,0.35);}
.project-card:hover .play-btn{opacity:1;}
.play-circle{width:32px;height:32px;background:rgba(255,255,255,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.project-info{padding:8px 10px;}
.project-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px;}
.project-date{font-size:10px;color:var(--text3);}
.editor-topbar{height:46px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0;}
.back-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text2);font-size:12px;}
.back-btn:hover{border-color:var(--purple);color:var(--text);}
.editor-title-el{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;outline:none;border:none;border-bottom:1px solid transparent;padding-bottom:1px;background:transparent;}
.editor-title-el:focus{border-bottom-color:var(--purple);}
.tool-tabs{display:flex;align-items:center;gap:3px;}
.tool-tab{padding:5px 10px;border-radius:7px;cursor:pointer;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;border:1px solid transparent;transition:all 0.2s;}
.tool-tab:hover{background:var(--bg3);color:var(--text);}
.tool-tab.active{background:linear-gradient(135deg,rgba(124,58,237,0.25),rgba(79,70,229,0.15));color:#fff;border-color:rgba(124,58,237,0.4);}
.export-btn{padding:6px 16px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:7px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}
.autosave-ind{font-size:10px;color:var(--green);display:flex;align-items:center;gap:3px;opacity:0;transition:opacity 0.4s;}
.editor-body{flex:1;display:flex;overflow:hidden;}
.editor-left{width:250px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.panel-scroll{flex:1;overflow-y:auto;padding:10px;}
.panel-scroll::-webkit-scrollbar{width:3px;}
.panel-scroll::-webkit-scrollbar-thumb{background:var(--border);}
.import-area{border:1px dashed var(--border2);border-radius:9px;padding:16px;text-align:center;cursor:pointer;margin-bottom:10px;transition:all 0.2s;}
.import-area:hover{border-color:var(--purple);background:rgba(124,58,237,0.04);}
.media-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.media-item{aspect-ratio:16/9;border-radius:7px;border:1px solid var(--border);overflow:hidden;cursor:pointer;background:var(--bg3);position:relative;}
.media-item:hover{border-color:var(--purple2);}
.sec-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.tr-item{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 5px;text-align:center;cursor:pointer;font-size:10px;color:var(--text2);transition:all 0.15s;}
.tr-item:hover,.tr-item.sel{border-color:var(--purple);background:rgba(124,58,237,0.12);color:var(--purple2);}
.tr-preview-box{height:36px;background:#090a0f;border-radius:5px;margin-bottom:4px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);}
.tr-bar{width:16px;height:16px;background:linear-gradient(135deg,var(--purple2),var(--blue));border-radius:3px;}
.tr-item:hover .tr-bar-fade{animation:trFade 1s infinite;}
.tr-item:hover .tr-bar-slide{animation:trSlide 1s infinite;}
.tr-item:hover .tr-bar-zoom{animation:trZoom 1s infinite;}
.tr-item:hover .tr-bar-spin{animation:trSpin 1s linear infinite;}
.tr-item:hover .tr-bar-blur{animation:trBlur 1s infinite;}
.tr-item:hover .tr-bar-flash{animation:trFlash 0.5s infinite;}
.tr-item:hover .tr-bar-burn{animation:trBurn 1s infinite;}
@keyframes trFade{0%,100%{opacity:1;}50%{opacity:0.1;}}
@keyframes trSlide{0%,100%{transform:translateX(-10px);}50%{transform:translateX(10px);}}
@keyframes trZoom{0%,100%{transform:scale(1);}50%{transform:scale(1.5);}}
@keyframes trSpin{to{transform:rotate(360deg);}}
@keyframes trBlur{0%,100%{filter:blur(0);}50%{filter:blur(4px);}}
@keyframes trFlash{0%,100%{background:#fff;filter:brightness(3);}50%{background:#222;}}
@keyframes trBurn{0%,100%{background:radial-gradient(#f97316,#b91c1c);}50%{background:#111;}}
.fx-item{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 5px;text-align:center;cursor:pointer;font-size:10px;color:var(--text2);transition:all 0.15s;}
.fx-item:hover,.fx-item.sel{border-color:var(--pink);background:rgba(236,72,153,0.1);color:var(--pink);}
.cap-sel{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px 8px;color:var(--text);font-size:11px;outline:none;width:100%;}
.auto-cap-btn{width:100%;padding:8px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:7px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;cursor:pointer;margin:7px 0 10px;display:flex;align-items:center;justify-content:center;gap:5px;}
.cap-tpls{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.cap-tpl{border-radius:7px;padding:7px;cursor:pointer;border:2px solid transparent;text-align:center;background:var(--bg3);}
.cap-tpl:hover,.cap-tpl.active{border-color:var(--purple);}
.cap-tpl-pre{height:28px;border-radius:3px;margin-bottom:4px;display:flex;align-items:center;justify-content:center;}
.cap-tpl-name{font-size:9px;color:var(--text2);}
.cap-list{display:flex;flex-direction:column;gap:4px;}
.cap-item{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 8px;display:flex;align-items:center;gap:6px;font-size:10px;}
.cap-time{color:var(--purple2);font-size:9px;font-family:monospace;min-width:60px;flex-shrink:0;}
.cdot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.cdot.on,.cdot:hover{border-color:#fff;}
.ai-chat-panel{display:none;flex-direction:column;flex:1;overflow:hidden;}
.ai-chat-hdr{padding:9px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.ai-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;}
.ai-chat-msgs{flex:1;overflow-y:auto;padding:9px;display:flex;flex-direction:column;gap:7px;}
.chat-msg{max-width:90%;padding:8px 10px;border-radius:9px;font-size:11px;line-height:1.5;}
.chat-msg.ai{background:var(--bg3);border:1px solid var(--border);align-self:flex-start;border-radius:3px 9px 9px 9px;}
.chat-msg.user{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;align-self:flex-end;border-radius:9px 3px 9px 9px;}
.ai-label{font-size:8px;color:var(--purple2);font-weight:700;margin-bottom:3px;letter-spacing:0.5px;}
.ai-quick{display:flex;flex-wrap:wrap;gap:4px;padding:5px 9px;}
.ai-qbtn{padding:3px 8px;background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);border-radius:18px;font-size:9px;color:var(--purple2);cursor:pointer;}
.ai-qbtn:hover{background:rgba(124,58,237,0.3);}
.ai-input-row{padding:7px;border-top:1px solid var(--border);display:flex;gap:5px;}
.ai-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:6px 8px;color:var(--text);font-size:11px;resize:none;outline:none;}
.ai-input:focus{border-color:var(--purple);}
.ai-send-btn{width:28px;height:28px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.editor-center{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.ratio-bar{display:flex;align-items:center;gap:5px;padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.ratio-bar::-webkit-scrollbar{display:none;}
.ratio-btn,.plat-btn{display:flex;align-items:center;gap:3px;padding:3px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:9px;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.ratio-btn:hover,.ratio-btn.active{border-color:var(--purple);color:var(--purple2);background:rgba(124,58,237,0.12);}
.plat-btn:hover,.plat-btn.active{border-color:var(--teal);color:var(--teal);background:rgba(13,148,136,0.1);}
.preview-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:radial-gradient(ellipse at center,#161a27,#0b0d13);overflow:hidden;}
.preview-screen{background:#000;border-radius:8px;border:1px solid var(--border);position:relative;overflow:hidden;width:70%;max-width:640px;aspect-ratio:16/9;flex-shrink:0;}
#preview-video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;display:none;}
#preview-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);z-index:1;}
.cap-ov{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:17px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.9);padding:0 14px;pointer-events:none;display:none;z-index:10;}
.trans-overlay{position:absolute;inset:0;pointer-events:none;z-index:20;opacity:0;transition:opacity 0.3s;}
.scale-bar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:7px;background:rgba(11,13,19,0.9);border:1px solid var(--border);border-radius:9px;padding:5px 11px;z-index:5;}
.scale-btn{width:20px;height:20px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:13px;font-weight:700;user-select:none;}
.scale-btn:hover{border-color:var(--purple);color:var(--purple2);}
.ai-ind{position:absolute;top:10px;right:10px;background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.4);border-radius:8px;padding:6px 11px;display:flex;align-items:center;gap:6px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:15;}
.ai-ind.show{opacity:1;}
.ai-spinner{width:13px;height:13px;border:2px solid rgba(124,58,237,0.3);border-top-color:var(--purple2);border-radius:50%;animation:spin 0.8s linear infinite;}
.preview-controls{height:48px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;}
.preview-time{font-size:11px;color:var(--text2);font-family:monospace;}
.prev-btn{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);}
.play-main-btn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.editor-right{width:230px;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;padding:12px;flex-shrink:0;}
.editor-right::-webkit-scrollbar{width:3px;}
.editor-right::-webkit-scrollbar-thumb{background:var(--border);}
.props-sec{margin-bottom:14px;}
.props-title{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.prop-label{font-size:11px;color:var(--text2);}
.toggle{width:32px;height:17px;background:var(--border2);border-radius:8px;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;}
.toggle.on{background:var(--purple);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;background:#fff;border-radius:50%;transition:transform 0.2s;}
.toggle.on::after{transform:translateX(15px);}
.rp-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 4px;text-align:center;cursor:pointer;font-size:9px;color:var(--text2);transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:2px;}
.rp-btn:hover{border-color:var(--purple);color:var(--purple2);}
.rp-btn-full{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 8px;cursor:pointer;font-size:10px;color:var(--text2);transition:all 0.15s;display:flex;align-items:center;gap:4px;width:100%;margin-bottom:3px;}
.rp-btn-full:hover{border-color:var(--purple);color:var(--text);}
.rp-btn-full.red{border-color:rgba(239,68,68,0.3);color:var(--red);}
.rp-btn-full.red:hover{background:rgba(239,68,68,0.1);}
.spd-pre{padding:2px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;font-size:9px;color:var(--text2);cursor:pointer;transition:all 0.15s;}
.spd-pre:hover,.spd-pre.on{border-color:var(--purple);color:var(--purple2);background:rgba(124,58,237,0.12);}
.sl-row{display:flex;align-items:center;gap:4px;margin-bottom:5px;}
.sl-lbl{font-size:9px;color:var(--text2);min-width:50px;flex-shrink:0;}
.sl-val{font-size:9px;color:var(--text2);min-width:24px;text-align:right;flex-shrink:0;}
.timeline{height:195px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;}
.tl-toolbar{height:38px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px;padding:0 10px;flex-shrink:0;overflow-x:auto;}
.tl-toolbar::-webkit-scrollbar{display:none;}
.tl-btn{width:26px;height:26px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all 0.15s;flex-shrink:0;}
.tl-btn:hover{border-color:var(--purple);color:var(--purple2);}
.tl-btn.red:hover{border-color:var(--red);color:var(--red);}
.tl-div{width:1px;height:16px;background:var(--border);margin:0 2px;flex-shrink:0;}
.add-layer-v{display:flex;align-items:center;gap:3px;padding:3px 8px;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.35);border-radius:5px;font-size:9px;color:var(--blue);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.add-layer-v:hover{background:rgba(59,130,246,0.25);}
.add-layer-a{display:flex;align-items:center;gap:3px;padding:3px 8px;background:rgba(13,148,136,0.12);border:1px solid rgba(13,148,136,0.35);border-radius:5px;font-size:9px;color:var(--teal);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.add-layer-a:hover{background:rgba(13,148,136,0.25);}
.tl-dur-box{display:flex;align-items:center;gap:4px;background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:2px 8px;flex-shrink:0;}
.tl-zoom-bar{display:flex;align-items:center;gap:5px;margin-left:auto;background:var(--bg4);border:1px solid var(--border);border-radius:7px;padding:2px 7px;flex-shrink:0;}
.tl-zoom-btn{width:20px;height:20px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:13px;font-weight:700;user-select:none;}
.tl-zoom-btn:hover{border-color:var(--purple);color:var(--purple2);}
.tl-zoom-lbl{font-size:9px;color:var(--text3);min-width:24px;text-align:center;}
.tl-body{flex:1;display:flex;overflow:hidden;}
.tl-labels{width:86px;background:var(--bg3);border-right:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;}
.tl-lbl{height:32px;display:flex;align-items:center;padding:0 6px;font-size:9px;color:var(--text3);border-bottom:1px solid rgba(255,255,255,0.03);gap:3px;flex-shrink:0;white-space:nowrap;}
.tl-lbl-ruler{height:20px;background:var(--bg4);border-bottom:1px solid var(--border);flex-shrink:0;}
.tl-lbl.v-lbl{color:var(--purple2);background:rgba(124,58,237,0.04);}
.tl-lbl.a-lbl{color:var(--teal);background:rgba(13,148,136,0.04);}
.tl-lbl.ev-lbl{color:var(--blue);background:rgba(59,130,246,0.04);}
.tl-lbl.ea-lbl{color:var(--teal);background:rgba(13,148,136,0.04);}
.lbl-del{margin-left:auto;color:var(--red);cursor:pointer;opacity:0.5;font-size:10px;}
.lbl-del:hover{opacity:1;}
.tl-tracks-wrap{flex:1;overflow-x:auto;overflow-y:hidden;position:relative;}
.tl-tracks-wrap::-webkit-scrollbar{height:4px;}
.tl-tracks-wrap::-webkit-scrollbar-thumb{background:var(--border);}
.tl-inner{display:flex;flex-direction:column;min-width:2000px;position:relative;}
.tl-ruler{height:20px;display:flex;align-items:center;background:var(--bg4);border-bottom:1px solid var(--border);overflow:hidden;flex-shrink:0;}
.ruler-mark{flex-shrink:0;font-size:8px;color:var(--text3);border-left:1px solid var(--border2);padding-left:4px;height:100%;display:flex;align-items:center;}
.tl-track{height:32px;display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,0.03);position:relative;flex-shrink:0;}
.tl-track.v-zone{background:rgba(124,58,237,0.02);}
.tl-track.a-zone{background:rgba(13,148,136,0.02);}
.tl-track.drop-hl{background:rgba(124,58,237,0.12)!important;outline:1px dashed var(--purple);}
.tl-clip{height:24px;border-radius:4px;display:flex;align-items:center;overflow:hidden;font-size:9px;font-weight:500;cursor:grab;white-space:nowrap;border:2px solid transparent;user-select:none;position:absolute;}
.tl-clip:active{cursor:grabbing;}
.tl-clip:hover{filter:brightness(1.1);}
.tl-clip.sel{border-color:#fff!important;box-shadow:0 0 0 2px rgba(255,255,255,0.2);}
.clip-v{background:linear-gradient(135deg,rgba(124,58,237,0.6),rgba(79,70,229,0.45));border-color:rgba(124,58,237,0.85);color:#c4b5fd;}
.clip-a{background:linear-gradient(135deg,rgba(13,148,136,0.6),rgba(6,182,212,0.45));border-color:rgba(13,148,136,0.85);color:#5eead4;}
.clip-cap{background:linear-gradient(135deg,rgba(236,72,153,0.6),rgba(168,85,247,0.45));border-color:rgba(236,72,153,0.85);color:#f9a8d4;}
.clip-fx{background:linear-gradient(135deg,rgba(245,158,11,0.6),rgba(239,68,68,0.4));border-color:rgba(245,158,11,0.75);color:#fcd34d;}
.clip-thumb{height:22px;width:34px;object-fit:cover;flex-shrink:0;}
.clip-name{padding:0 5px;flex:1;overflow:hidden;text-overflow:ellipsis;}
.clip-dur{font-size:8px;opacity:0.7;padding-right:4px;flex-shrink:0;}
.playhead{position:absolute;top:0;bottom:0;width:2px;background:var(--red);z-index:30;cursor:ew-resize;left:0;}
.ph-top{position:absolute;top:-1px;left:-7px;width:16px;height:10px;background:var(--red);clip-path:polygon(0 0,100% 0,50% 100%);}
.trans-node{position:absolute;width:22px;height:28px;top:50%;transform:translateY(-50%);background:linear-gradient(135deg,rgba(124,58,237,0.95),rgba(79,70,229,0.9));border:2px solid #a855f7;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;box-shadow:0 0 8px rgba(124,58,237,0.6);transition:all 0.15s;}
.trans-node:hover{border-color:#fff;box-shadow:0 0 14px rgba(124,58,237,0.9);transform:translateY(-50%) scale(1.1);}
.trans-node span{color:#fff;font-size:10px;font-weight:800;user-select:none;}
.trans-drop-hl{position:absolute;top:2px;bottom:2px;width:3px;background:var(--purple2);border-radius:2px;z-index:15;pointer-events:none;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;min-width:380px;}
.modal-h{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#fff;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{width:24px;height:24px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);}
.ex-sec{margin-bottom:11px;}
.ex-lbl{font-size:9px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
.ex-sel{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:11px;outline:none;}
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ex-btn{width:100%;padding:10px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:8px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;cursor:pointer;margin-top:12px;}
.ctx-menu{position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px;z-index:500;display:none;min-width:135px;box-shadow:0 8px 32px rgba(0,0,0,0.6);}
.ctx-menu.open{display:block;}
.ctx-item{padding:6px 10px;border-radius:4px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--text);}
.ctx-item:hover{background:var(--bg3);}
.ctx-item.red{color:var(--red);}
.ctx-div-line{height:1px;background:var(--border);margin:3px 0;}
.notif{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--green);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--green);display:flex;align-items:center;gap:6px;z-index:2000;opacity:0;transform:translateY(8px);transition:all 0.3s;}
.notif.show{opacity:1;transform:translateY(0);}
.sel-info{font-size:10px;color:var(--yellow);display:none;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes wavebar{from{transform:scaleY(0.3);}to{transform:scaleY(1);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
input[type=range]{accent-color:var(--purple);}
</style>
</head>
